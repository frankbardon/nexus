name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement to Nexus.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've thought about.

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Engine / Core
        - Agents
        - LLM Providers
        - Tools
        - I/O Interfaces
        - Memory
        - Gates
        - Planners
        - Desktop Shell
        - New Plugin
        - Documentation
        - Other
