# Test: journal exclusion of core.tick. Tick interval is set well below the
# session lifetime so many heartbeats fire on the bus, all of which must be
# suppressed from <session>/journal/events.jsonl while the on-disk seq
# sequence stays gap-free.
#
# Mock mode (no API key required).
#
# Run:
#   go test -tags integration ./tests/integration/ -run TestJournalExclude
core:
  log_level: warn
  tick_interval: 100ms
  max_concurrent_events: 100
  models:
    default: mock
    mock:
      provider: nexus.llm.anthropic
      model: mock
      max_tokens: 4096
  sessions:
    root: ~/.nexus/test-sessions
    retention: 30d
    id_format: datetime_short

journal:
  fsync: every-event
  retain_days: 30
  rotate_size_mb: 4
  exclude_events:
    - core.tick

plugins:
  active:
    - nexus.io.test
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.memory.capped

  nexus.io.test:
    inputs:
      - "first"
      - "second"
      - "third"
    input_delay: 600ms
    approval_mode: approve
    timeout: 15s
    mock_responses:
      - content: "ok"
      - content: "ok"
      - content: "ok"

  nexus.llm.anthropic:
    api_key: "sk-mock-not-used"

  nexus.agent.react:
    system_prompt: "You are a test assistant."

  nexus.memory.capped:
    max_messages: 10
    persist: false
