core:
  log_level: info
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: balanced
    balanced:
      provider: nexus.llm.anthropic
      model: claude-sonnet-4-20250514
      max_tokens: 8192
    quick:
      provider: nexus.llm.anthropic
      model: claude-haiku-4-5-20251001
      max_tokens: 4096
  sessions:
    root: ~/.nexus/sessions
    retention: 30d

plugins:
  active:
    - nexus.io.tui
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.gate.endless_loop
    - nexus.memory.capped

    # RAG primitives. Both capabilities auto-activate when required by
    # nexus.tool.knowledge_search and nexus.memory.vector, but listing them here
    # lets you tune their config without fighting the merge rules.
    - nexus.embeddings.openai
    - nexus.vectorstore.chromem
    - nexus.rag.ingest

    # RAG consumers. Pick one or both. nexus.tool.knowledge_search exposes
    # a tool the LLM calls explicitly; nexus.memory.vector runs automatically
    # on every user message and after compaction.
    - nexus.tool.knowledge_search
    - nexus.memory.vector

  nexus.llm.anthropic:
    api_key_env: ANTHROPIC_API_KEY

  nexus.agent.react:
    system_prompt: |
      You are a helpful assistant with access to a knowledge base. When the user
      asks a factual question, use the knowledge_search tool first to pull
      supporting chunks from the knowledge base, then cite sources by file path.

  nexus.gate.endless_loop:
    max_iterations: 10

  nexus.memory.capped:
    max_messages: 100
    persist: true

  # Embeddings provider. OpenAI's text-embedding-3-small is a fine default;
  # override with `model:` or swap the whole provider by activating a
  # different embeddings.provider plugin (none ship yet — adapters welcome).
  nexus.embeddings.openai:
    api_key_env: OPENAI_API_KEY
    # model: text-embedding-3-small
    # dimensions: 1536

  # Vector store. Namespaces are directories under `path`. chromem-go is
  # pure Go with JSON on-disk persistence — suitable up to low millions of
  # chunks; swap for sqlite-vec / pgvector / Qdrant when you outgrow it.
  nexus.vectorstore.chromem:
    path: ~/.nexus/vectors
    compress: false

  # Ingest plugin. The chunker defaults (1000/200) are a generic prose
  # starting point. The cache stores hash→vector keyed per embedding
  # model, so changing `model:` above invalidates the cache cleanly.
  nexus.rag.ingest:
    chunker:
      size: 1000
      overlap: 200
    # cache_dir: ~/.nexus/vectors/_cache
    #
    # Watch-mode entries. Each path is a directory fsnotify watches; file
    # writes/deletes re-ingest or drop automatically. Glob is optional.
    # watch:
    #   - path: ./docs
    #     glob: "*.md"
    #     namespace: project-docs
    #   - path: ./knowledge-base
    #     namespace: kb

  # knowledge_search tool. Allow-list of namespaces the LLM can query;
  # the default subset is what's used when the LLM doesn't narrow down.
  nexus.tool.knowledge_search:
    namespaces: [kb, project-docs]
    default_namespaces: [kb, project-docs]
    top_k: 5
    include_metadata: true

  # Vector memory. Per-agent namespace isolates recall by default. Auto-
  # stores compaction summaries (safe, high-signal); user-input auto-store
  # is off so you don't accumulate every turn as noise.
  nexus.memory.vector:
    # namespace: memory-default        # default: "memory-{InstanceID}"
    top_k: 5
    min_similarity: 0.3
    auto_store_compaction: true
    auto_store_user_input: false

