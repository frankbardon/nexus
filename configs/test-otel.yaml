# Test: OTEL trace export via OTLP/HTTP to an in-process collector
# Validates: nexus.observe.otel boots, opens an HTTP OTLP connection, and
# successfully POSTs spans (one root nexus.session span + per-event spans)
# to the configured endpoint at /v1/traces during the engine lifecycle.
#
# The endpoint is a placeholder — tests override nexus.observe.otel.endpoint
# to point at an httptest.Server before booting via copyConfig.
#
# Mocked LLM responses, no API key required.
#
# Run:
#   go test -tags integration ./tests/integration/ -run TestOTEL
core:
  log_level: warn
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: mock
    mock:
      provider: nexus.llm.anthropic
      model: mock
      max_tokens: 4096
  sessions:
    root: ~/.nexus/test-sessions
    retention: 30d
    id_format: datetime_short

plugins:
  active:
    - nexus.io.test
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.gate.endless_loop
    - nexus.memory.capped
    - nexus.observe.otel

  nexus.io.test:
    inputs:
      - "Hello."
    input_delay: 200ms
    approval_mode: approve
    timeout: 20s
    mock_responses:
      - content: "Hi."

  nexus.llm.anthropic:
    api_key: "sk-mock-not-used"

  nexus.agent.react:
    system_prompt: "You are a test assistant."

  nexus.gate.endless_loop:
    max_iterations: 3

  nexus.memory.capped:
    max_messages: 10
    persist: false

  nexus.observe.otel:
    endpoint: "127.0.0.1:14318" # overridden by tests
    protocol: http
    insecure: true
    service_name: nexus-otel-test
    exclude_events:
      - core.tick
