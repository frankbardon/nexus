# Test: ReAct booted with nexus.memory.simple as the memory.history provider.
# Validates: capability resolution picks simple when it is listed first,
#            simple plugin serves memory.history.query correctly,
#            ReAct completes a turn against an unbounded in-memory buffer.
#
# Run (automated):
#   go test -tags integration ./tests/integration/ -run TestMemorySimple
#
# Design: Mock mode — no real LLM calls, no API key needed.
core:
  log_level: info
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: quick
    quick:
      provider: nexus.llm.anthropic
      model: claude-haiku-4-5-20251001
      max_tokens: 4096
  sessions:
    root: ~/.nexus/test-sessions
    retention: 30d
    id_format: datetime_short

plugins:
  active:
    - nexus.io.test
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.memory.simple

  nexus.io.test:
    inputs:
      - "Hello"
      - "What did I just say?"
    input_delay: 200ms
    approval_mode: approve
    timeout: 30s
    mock_responses:
      - content: "Hi there."
      - content: "You said hello."

  nexus.llm.anthropic:
    api_key: "sk-mock-not-used"

  nexus.agent.react:
    system_prompt: "You are a test assistant. Respond literally."
