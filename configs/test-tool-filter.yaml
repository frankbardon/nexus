# Test: Tool filter gate sets ToolFilter struct on LLM request
# Validates: tool_filter gate runs at priority 10, populates req.ToolFilter
# with the configured include list before mock interception.
#
# Uses mocked LLM responses — no API key required.
#
# Run:
#   go test -tags integration ./tests/integration/ -run TestToolFilter
core:
  log_level: warn
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: mock
    mock:
      provider: nexus.llm.anthropic
      model: mock
      max_tokens: 4096
  sessions:
    root: ~/.nexus/test-sessions
    retention: 30d
    id_format: datetime_short

plugins:
  active:
    - nexus.io.test
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.gate.endless_loop
    - nexus.gate.tool_filter
    - nexus.tool.shell
    - nexus.tool.file
    - nexus.memory.capped

  nexus.io.test:
    inputs:
      - "List files in the current directory."
    input_delay: 200ms
    approval_mode: approve
    timeout: 20s
    # Mock #1: tool call to list_files (which IS in the include list).
    # Mock #2: final assistant content closes the turn.
    mock_responses:
      - tool_calls:
          - name: list_files
            arguments: '{"path":"."}'
      - content: "Listed files."

  nexus.llm.anthropic:
    api_key: "sk-mock-not-used"

  nexus.agent.react:
    system_prompt: "You are a test assistant. Use the tools provided."

  nexus.gate.endless_loop:
    max_iterations: 5

  # Only allow file tools — shell excluded via filter.
  nexus.gate.tool_filter:
    include: [read_file, write_file, check_file_size, list_files]

  nexus.tool.shell:
    allowed_commands: [ls, cat]
    timeout: 15s

  nexus.tool.file:
    allow_external_writes: false

  nexus.memory.capped:
    max_messages: 10
    persist: false
