# Test: Both providers active — Anthropic for reasoning, OpenAI for quick tasks
# Validates: multi-provider routing, model role → provider mapping, provider coexistence
#
# Run:
#   bin/nexus -config configs/test-mixed-providers.yaml
#
# Prerequisites:
#   - ANTHROPIC_API_KEY set in env or .env
#   - OPENAI_API_KEY set in env or .env
#
# What to test:
#   1. Boot: Both providers init without conflict. Check logs for both plugin IDs.
#   2. Default routing: Normal messages use "balanced" role → Anthropic (claude-sonnet).
#      Verify response style matches Claude, not GPT.
#   3. Quick role: If agent internally uses "quick" model role (e.g. for compaction
#      or sub-tasks), it should route to OpenAI (gpt-4o-mini). Check logger output
#      for provider in llm.request events.
#   4. Provider isolation: Both providers maintain separate state — no API key cross-talk.
#   5. Missing key: Remove one API key — that provider should fail init cleanly,
#      only roles using that provider should break.
#
# What to watch for:
#   - llm.request events in logs show correct provider for each model role
#   - No "provider not found" errors for registered roles
#   - Token counting works independently per provider
core:
  log_level: info
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: balanced
    reasoning:
      provider: nexus.llm.anthropic
      model: claude-opus-4-20250514
      max_tokens: 16384
    balanced:
      provider: nexus.llm.anthropic
      model: claude-sonnet-4-20250514
      max_tokens: 8192
    quick:
      provider: nexus.llm.openai
      model: gpt-4o-mini
      max_tokens: 4096
    # Provider fallback: balanced with OpenAI fallback.
    # Requires nexus.provider.fallback in plugins.active.
    # balanced:
    #   - provider: nexus.llm.anthropic
    #     model: claude-sonnet-4-20250514
    #     max_tokens: 8192
    #   - provider: nexus.llm.openai
    #     model: gpt-4o
    #     max_tokens: 8192
  sessions:
    root: ~/.nexus/test-sessions
    retention: 30d
    id_format: datetime_short

plugins:
  active:
    - nexus.io.tui
    - nexus.llm.anthropic
    - nexus.llm.openai
    - nexus.agent.react
    - nexus.gate.endless_loop
    - nexus.memory.capped
    - nexus.observe.logger

  nexus.llm.anthropic:
    api_key_env: ANTHROPIC_API_KEY

  nexus.llm.openai:
    api_key_env: OPENAI_API_KEY

  nexus.agent.react:
    system_prompt: You are a conversationalist, always respond in a helpful manner.

  nexus.gate.endless_loop:
    max_iterations: 10

  nexus.memory.capped:
    max_messages: 100
    persist: true

  nexus.observe.logger:
    output: stderr
    level: info
