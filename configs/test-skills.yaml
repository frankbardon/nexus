# Test: Skills plugin with various config options
# Validates: skill discovery, catalog injection, activation, max_active limit, disabled list
#
# Run:
#   bin/nexus -config configs/test-skills.yaml
#
# Prerequisites:
#   - ANTHROPIC_API_KEY set in env or .env
#   - Skills present in ./skills/ directory (SKILL.md files)
#   - Optional: skills in ~/.agents/skills/ (global skills)
#
# What to test:
#   1. Discovery: On boot, plugin scans ./skills/ for SKILL.md files. Check logs for
#      discovered skill count.
#   2. Catalog in prompt: catalog_in_system_prompt=true. Ask "what skills are available?"
#      — agent should know about discovered skills from system prompt injection.
#   3. Activate skill: Ask agent to use a specific skill (by name from catalog).
#      Verify skill.activate event fires and skill instructions injected into context.
#   4. Max active limit: max_active_skills=3. Activate 3 skills, then try a 4th —
#      should be rejected or oldest deactivated. Verify limit enforced.
#   5. Trust mode: trust_project="ask". When activating a project-local skill, agent
#      should ask for user confirmation before activation.
#   6. Disabled skills: disabled_skills=[] (none disabled). Add a skill name to this
#      list, restart — that skill should not appear in catalog.
#   7. Skill deactivation: After using a skill, verify it can be deactivated and
#      instructions removed from context.
#
# What to watch for:
#   - Skills with output_schema register schemas via schema.register event
#   - Skill YAML frontmatter parsed correctly (name, description, triggers)
#   - System prompt doesn't bloat with many skills (catalog is names+descriptions only)
#   - Skill activation/deactivation events fire correctly on bus
core:
  log_level: info
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: balanced
    balanced:
      provider: nexus.llm.anthropic
      model: claude-sonnet-4-20250514
      max_tokens: 8192
  sessions:
    root: ~/.nexus/sessions
    retention: 30d
    id_format: datetime_short

plugins:
  active:
    - nexus.io.tui
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.gate.endless_loop
    - nexus.skills
    - nexus.memory.conversation
    - nexus.observe.logger

  nexus.llm.anthropic:
    api_key_env: ANTHROPIC_API_KEY

  nexus.agent.react:
    system_prompt_file: ./prompts/conversationalist.md

  nexus.gate.endless_loop:
    max_iterations: 15

  nexus.skills:
    scan_paths: ["./skills/"]
    trust_project: ask
    max_active_skills: 3
    catalog_in_system_prompt: true
    disabled_skills: []

  nexus.memory.conversation:
    max_messages: 100
    persist: true

  nexus.observe.logger:
    output: stderr
    level: info
