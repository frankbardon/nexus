# Demo: ReAct agent with dynamic planning + full tool suite
# Validates: planning → execution handoff, plan steps as context during tool use, plan persistence
#
# Run:
#   bin/nexus -config configs/demo-planned-react-tools.yaml
#
# Prerequisites:
#   - ANTHROPIC_API_KEY set in env or .env
#
# What to test:
#   1. Plan generation: Send a task like "Explore this Go project and summarize the
#      architecture." Planner (reasoning=opus) generates a plan BEFORE agent starts
#      tool use. Plan should appear in TUI.
#   2. Auto-approval: approval=auto — planner's LLM decides if plan needs approval.
#      Simple tasks should auto-approve; complex/destructive tasks should prompt.
#   3. Plan-guided execution: After plan approved, ReAct agent executes with plan
#      injected into system prompt. Agent should follow plan steps, using tools
#      (shell, file) as needed. Verify agent references plan steps in reasoning.
#   4. Tool use during plan: Agent has full tool suite (go, git, ls, cat, grep, etc.).
#      Each plan step may involve multiple tool calls. Watch for plan step transitions.
#   5. Thinking observer: thinking.jsonl should capture agent's reasoning about
#      which plan step it's executing and why it chose specific tools.
#   6. Plan persistence: Check session dir for planner plugin data —
#      plugins/nexus.planner.dynamic/<planID>/plan.json, request.json.
#   7. Max steps: max_steps=10. Give a very complex task — plan should consolidate
#      into at most 10 steps.
#   8. 25 iterations: Higher iteration limit accommodates multi-step plans with
#      tool use. Verify agent can complete a 5-step plan with 2-3 tools per step.
#
# What to watch for:
#   - Plan generated by opus, execution by sonnet — different model quality visible
#   - planning=true on react agent triggers plan.request event on first user message
#   - Plan appears in TUI before any tool calls
#   - Thinking JSONL has both planning and execution reasoning
#   - Session dir has both planner and thinking observer data
core:
  log_level: info
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: balanced
    reasoning:
      provider: nexus.llm.anthropic
      model: claude-opus-4-20250514
      max_tokens: 16384
    balanced:
      provider: nexus.llm.anthropic
      model: claude-sonnet-4-20250514
      max_tokens: 8192
  sessions:
    root: ~/.nexus/test-sessions
    retention: 30d
    id_format: datetime_short

plugins:
  active:
    - nexus.io.tui
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.planner.dynamic
    - nexus.gate.endless_loop
    - nexus.tool.shell
    - nexus.tool.file
    - nexus.memory.capped
    - nexus.observe.logger
    - nexus.observe.thinking

  nexus.llm.anthropic:
    api_key_env: ANTHROPIC_API_KEY

  nexus.agent.react:
    planning: true
    system_prompt: |
      You are a coding assistant powered by Nexus. You help users write, debug, refactor, and understand code.

      ## Guidelines

      1. Always explain your reasoning before making changes
      2. Run tests after modifications to verify correctness
      3. Prefer minimal, targeted changes over broad refactors
      4. Ask for clarification when requirements are ambiguous
      5. Read files in chunks 16kb or less
      6. Follow the existing code style and conventions of the project

  nexus.planner.dynamic:
    model_role: reasoning
    max_steps: 10
    approval: auto

  nexus.gate.endless_loop:
    max_iterations: 25

  nexus.tool.shell:
    allowed_commands: [go, git, ls, cat, grep, find, mkdir, rm, cp, mv, make]
    timeout: 30s
    sandbox: true

  nexus.tool.file:
    allow_external_writes: false

  nexus.memory.capped:
    max_messages: 100
    persist: true

  nexus.observe.logger:
    output: stderr
    level: info
