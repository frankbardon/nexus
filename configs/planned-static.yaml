core:
  log_level: warn
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: balanced
    reasoning:
      provider: nexus.llm.anthropic
      model: claude-opus-4-20250514
      max_tokens: 16384
    balanced:
      provider: nexus.llm.anthropic
      model: claude-sonnet-4-20250514
      max_tokens: 8192
    quick:
      provider: nexus.llm.anthropic
      model: claude-haiku-4-5-20251001
      max_tokens: 4096
    # Provider fallback: use an ordered array instead of a single map.
    # First entry = primary, subsequent entries tried on failure.
    # Requires nexus.provider.fallback in plugins.active + both provider plugins.
    # balanced:
    #   - provider: nexus.llm.anthropic
    #     model: claude-sonnet-4-20250514
    #     max_tokens: 8192
    #   - provider: nexus.llm.openai
    #     model: gpt-4o
    #     max_tokens: 8192
  sessions:
    root: ~/.nexus/sessions
    retention: 30d
    id_format: datetime_short

# Minimal example demonstrating the ReAct agent with the static planner.
plugins:
  active:
    - nexus.io.tui
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.planner.static
    - nexus.memory.capped
    - nexus.observe.logger

  nexus.llm.anthropic:
    api_key_env: ANTHROPIC_API_KEY

  nexus.agent.react:
    max_iterations: 10
    system_prompt_file: ./prompts/coding-assistant.md
    planning: true

  nexus.planner.static:
    approval: never
    summary: "Standard coding workflow"
    steps:
      - description: "Analyze the request and identify affected files"
      - description: "Plan the implementation approach"
      - description: "Implement the changes"
      - description: "Verify correctness"
      - description: "Summarize what was done"

  nexus.memory.capped:
    max_messages: 100
    persist: true

  nexus.observe.logger:
    output: stderr
    level: warn
