core:
  log_level: info
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: balanced
    reasoning:
      provider: nexus.llm.anthropic
      model: claude-opus-4-20250514
      max_tokens: 16384
    balanced:
      provider: nexus.llm.anthropic
      model: claude-sonnet-4-20250514
      max_tokens: 8192
    quick:
      provider: nexus.llm.anthropic
      model: claude-haiku-4-5-20251001
      max_tokens: 4096
    # Provider fallback: use an ordered array instead of a single map.
    # First entry = primary, subsequent entries tried on failure.
    # Requires nexus.provider.fallback in plugins.active + both provider plugins.
    # balanced:
    #   - provider: nexus.llm.anthropic
    #     model: claude-sonnet-4-20250514
    #     max_tokens: 8192
    #   - provider: nexus.llm.openai
    #     model: gpt-4o
    #     max_tokens: 8192
  sessions:
    root: ~/.nexus/sessions
    retention: 30d
    id_format: datetime_short

# Minimal example demonstrating the orchestrator agent delegating to subagent workers.
plugins:
  active:
    - nexus.io.tui
    - nexus.llm.anthropic
    - nexus.agent.orchestrator
    - nexus.agent.subagent/main
    - nexus.memory.conversation
    - nexus.observe.logger

  nexus.llm.anthropic:
    api_key_env: ANTHROPIC_API_KEY

  nexus.agent.orchestrator:
    max_workers: 3
    max_subtasks: 5
    orchestrator_model_role: balanced
    worker_model_role: balanced
    synthesis_model_role: balanced
    fail_fast: false
    worker_max_iterations: 8

  nexus.agent.subagent/main:
    max_iterations: 8

  nexus.memory.conversation:
    max_messages: 100
    persist: true

  nexus.observe.logger:
    output: stderr
    level: info
