# Test: All three observer plugins boot and coexist (logger + otel + thinking)
# Validates: observer plugins do not conflict on shared event bus subscriptions.
# OTel collector connection failure must not crash the engine — the plugin
# should log the failure and keep running.
#
# Uses mocked LLM responses — no API key required.
#
# Run:
#   go test -tags integration ./tests/integration/ -run TestObserversAll
core:
  log_level: warn
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: mock
    mock:
      provider: nexus.llm.anthropic
      model: mock
      max_tokens: 4096
  sessions:
    root: ~/.nexus/test-sessions
    retention: 30d
    id_format: datetime_short

plugins:
  active:
    - nexus.io.test
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.gate.endless_loop
    - nexus.memory.capped
    - nexus.observe.otel
    - nexus.observe.thinking

  nexus.io.test:
    inputs:
      - "Hello."
    input_delay: 200ms
    approval_mode: approve
    timeout: 20s
    mock_responses:
      - content: "Hi."

  nexus.llm.anthropic:
    api_key: "sk-mock-not-used"

  nexus.agent.react:
    system_prompt: "You are a test assistant."

  nexus.gate.endless_loop:
    max_iterations: 3

  nexus.memory.capped:
    max_messages: 10
    persist: false

  # Point at a port that should never have a collector listening — connection
  # failure is the expected case. Plugin must not crash on this.
  nexus.observe.otel:
    endpoint: "localhost:14317"
    protocol: grpc
    insecure: true
    service_name: nexus-test
    exclude_events:
      - core.tick
