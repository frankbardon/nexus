core:
  log_level: info
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: balanced
    reasoning:
      provider: nexus.llm.anthropic
      model: claude-opus-4-20250514
      max_tokens: 16384
    balanced:
      provider: nexus.llm.anthropic
      model: claude-sonnet-4-20250514
      max_tokens: 8192
    quick:
      provider: nexus.llm.anthropic
      model: claude-haiku-4-5-20251001
      max_tokens: 4096
    # Provider fallback: use an ordered array instead of a single map.
    # First entry = primary, subsequent entries tried on failure.
    # Requires nexus.provider.fallback in plugins.active + both provider plugins.
    # balanced:
    #   - provider: nexus.llm.anthropic
    #     model: claude-sonnet-4-20250514
    #     max_tokens: 8192
    #   - provider: nexus.llm.openai
    #     model: gpt-4o
    #     max_tokens: 8192
  sessions:
    root: ~/.nexus/sessions
    retention: 30d
    id_format: datetime_short

# Minimal example demonstrating the ReAct agent configured for research use.
plugins:
  active:
    - nexus.io.tui
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.gate.endless_loop
    - nexus.tool.file
    - nexus.memory.capped
    - nexus.observe.logger

  nexus.llm.anthropic:
    api_key_env: ANTHROPIC_API_KEY

  nexus.agent.react:
    system_prompt: |
      You are a research assistant powered by Nexus. You help users investigate
      topics, analyze documents, and synthesize findings.

      ## Capabilities
      - Read and analyze documents and files
      - Search the web for information
      - Summarize and synthesize findings across sources
      - Create structured reports and notes

      ## Guidelines
      1. Gather information from multiple sources before drawing conclusions
      2. Cite your sources and distinguish between facts and inferences
      3. Organize findings in a clear, structured format
      4. Ask clarifying questions to narrow broad research topics
      5. Track your research progress and share intermediate findings
      6. Flag conflicting information from different sources

  nexus.gate.endless_loop:
    max_iterations: 50

  nexus.tool.file:

  nexus.memory.capped:
    max_messages: 200
    persist: true

  nexus.observe.logger:
    output: stderr
    level: info
