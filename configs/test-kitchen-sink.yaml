# Test: Boot validator — every plugin active simultaneously
# Validates: all plugins boot in dependency order without conflicts, no init
# errors, event bus survives all gate handlers + subagent + planner registration.
#
# Uses mocked LLM responses — no API key required. Planning disabled so the
# test exercises pure plugin coexistence rather than plan-then-execute flow
# (covered separately by test-static-plan-approval and Wave 3 planner tests).
#
# Run:
#   go test -tags integration ./tests/integration/ -run TestKitchenSink
core:
  log_level: warn
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: mock
    mock:
      provider: nexus.llm.anthropic
      model: mock
      max_tokens: 4096
  sessions:
    root: ~/.nexus/test-sessions
    retention: 30d
    id_format: datetime_short

plugins:
  active:
    - nexus.io.test
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.agent.subagent
    - nexus.gate.endless_loop
    - nexus.gate.stop_words
    - nexus.gate.token_budget
    - nexus.gate.rate_limiter
    - nexus.gate.prompt_injection
    - nexus.gate.output_length
    - nexus.gate.content_safety
    - nexus.gate.context_window
    - nexus.gate.tool_filter
    - nexus.tool.shell
    - nexus.tool.file
    - nexus.skills
    - nexus.memory.capped
    - nexus.memory.longterm
    - nexus.observe.thinking

  nexus.io.test:
    inputs:
      - "Hello."
    input_delay: 200ms
    approval_mode: approve
    timeout: 20s
    mock_responses:
      - content: "Hi."

  nexus.llm.anthropic:
    api_key: "sk-mock-not-used"

  nexus.agent.react:
    system_prompt: "You are a test assistant."

  nexus.agent.subagent:
    system_prompt: "Test subagent."

  nexus.gate.endless_loop:
    max_iterations: 5

  nexus.gate.stop_words:
    words: ["BLOCKED"]

  nexus.gate.token_budget:
    max_tokens: 100000

  nexus.gate.rate_limiter:
    requests_per_minute: 60

  nexus.gate.prompt_injection:
    action: warn

  nexus.gate.output_length:
    max_chars: 5000

  nexus.gate.content_safety:
    action: redact

  nexus.gate.context_window:
    max_context_tokens: 100000

  nexus.gate.tool_filter:
    exclude: []

  nexus.tool.shell:
    allowed_commands: [echo]
    timeout: 10s
    sandbox: true

  nexus.tool.file:
    allow_external_writes: false

  nexus.skills:
    scan_paths: ["./tests/fixtures/skills/"]
    trust_project: never
    max_active_skills: 5

  nexus.memory.capped:
    max_messages: 10
    persist: false

  nexus.memory.longterm:
    scope: global
    auto_load: false
    path: "~/.nexus/test-sessions/memory/"

