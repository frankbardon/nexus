# Test: PlanExec agent with approval-required dynamic planner (live)
# Validates: planexec emits plan.request, dynamic planner generates plan, plan
# approval flow blocks until io.test responds, approve path runs to completion.
#
# Live mode — calls Anthropic API. Test gates on ANTHROPIC_API_KEY via t.Skip.
# Uses Haiku for both planner and execution to keep cost minimal.
#
# Run:
#   go test -tags integration ./tests/integration/ -run TestPlanexecApproval
core:
  log_level: warn
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: balanced
    reasoning:
      provider: nexus.llm.anthropic
      model: claude-haiku-4-5-20251001
      max_tokens: 4096
    balanced:
      provider: nexus.llm.anthropic
      model: claude-haiku-4-5-20251001
      max_tokens: 4096
  sessions:
    root: ~/.nexus/test-sessions
    retention: 30d
    id_format: datetime_short

plugins:
  active:
    - nexus.io.test
    - nexus.llm.anthropic
    - nexus.agent.planexec
    - nexus.planner.dynamic
    - nexus.gate.endless_loop
    - nexus.memory.capped

  nexus.io.test:
    inputs:
      - "Compute 2 plus 2 and explain the answer in one sentence."
    input_delay: 200ms
    approval_mode: approve
    timeout: 90s

  nexus.llm.anthropic:
    api_key_env: ANTHROPIC_API_KEY

  nexus.agent.planexec:
    execution_model_role: balanced
    replan_on_failure: false
    approval: always
    system_prompt: "You are a test assistant. Execute the plan provided."

  nexus.planner.dynamic:
    model_role: reasoning
    max_steps: 3
    approval: always

  nexus.gate.endless_loop:
    max_iterations: 8

  nexus.memory.capped:
    max_messages: 10
    persist: false
