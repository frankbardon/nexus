core:
  log_level: warn
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: balanced
    reasoning:
      provider: nexus.llm.anthropic
      model: claude-opus-4-20250514
      max_tokens: 16384
    balanced:
      provider: nexus.llm.anthropic
      model: claude-sonnet-4-20250514
      max_tokens: 8192
    quick:
      provider: nexus.llm.anthropic
      model: claude-haiku-4-5-20251001
      max_tokens: 4096
    # Provider fallback: use an ordered array instead of a single map.
    # First entry = primary, subsequent entries tried on failure.
    # Requires nexus.provider.fallback in plugins.active + both provider plugins.
    # balanced:
    #   - provider: nexus.llm.anthropic
    #     model: claude-sonnet-4-20250514
    #     max_tokens: 8192
    #   - provider: nexus.llm.openai
    #     model: gpt-4o
    #     max_tokens: 8192
  sessions:
    root: ~/.nexus/sessions
    retention: 30d
    id_format: datetime_short

plugins:
  # Some plugins auto-activate others they require (e.g. nexus.agent.react pulls
  # in nexus.memory.capped, nexus.control.cancel, and nexus.tool.catalog
  # with sensible defaults). See docs/src/architecture/plugin-system.md for the
  # expansion and merge rules; boot logs show every auto-activation.
  active:
    - nexus.io.tui
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.agent.subagent
    - nexus.gate.endless_loop
    - nexus.memory.capped
    - nexus.observe.logger

  nexus.llm.anthropic:
    api_key_env: ANTHROPIC_API_KEY

  nexus.agent.react:
    system_prompt: You are a conversationalist, always respond in a helpful manner.

  nexus.agent.subagent:
    system_prompt: "Take in the user input and summarize the problem. Speak like a pirate."

  nexus.gate.endless_loop:
    max_iterations: 10

  nexus.memory.capped:
    max_messages: 100
    persist: true

  # nexus.memory.compaction:
