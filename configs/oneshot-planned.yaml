core:
  log_level: error
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: balanced
    reasoning:
      provider: nexus.llm.anthropic
      model: claude-opus-4-20250514
      max_tokens: 16384
    balanced:
      provider: nexus.llm.anthropic
      model: claude-sonnet-4-20250514
      max_tokens: 8192
    quick:
      provider: nexus.llm.anthropic
      model: claude-haiku-4-5-20251001
      max_tokens: 4096
    # Provider fallback: use an ordered array instead of a single map.
    # First entry = primary, subsequent entries tried on failure.
    # Requires nexus.provider.fallback in plugins.active + both provider plugins.
    # balanced:
    #   - provider: nexus.llm.anthropic
    #     model: claude-sonnet-4-20250514
    #     max_tokens: 8192
    #   - provider: nexus.llm.openai
    #     model: gpt-4o
    #     max_tokens: 8192
  sessions:
    root: ~/.nexus/sessions
    retention: 30d
    id_format: datetime_short

# Oneshot config with a dynamic planner. Any plan that would normally
# require approval is auto-approved by the oneshot IO plugin, so `approval`
# can safely be set to `always` here for end-to-end testing of the approval
# path.
plugins:
  active:
    - nexus.io.oneshot
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.planner.dynamic
    - nexus.memory.capped
    - nexus.observe.logger

  nexus.io.oneshot:
    pretty: true
    read_stdin: true

  nexus.llm.anthropic:
    api_key_env: ANTHROPIC_API_KEY

  nexus.agent.react:
    max_iterations: 10
    system_prompt: You are a conversationalist, always respond in a helpful manner.
    planning: true

  nexus.planner.dynamic:
    approval: always
    max_steps: 5
    model_role: quick

  nexus.memory.capped:
    max_messages: 20
    persist: true

  nexus.observe.logger:
    output: stderr
    level: error
