# Test: Multiple named subagent instances with different roles
# Validates: instanced plugin IDs, per-instance config, different system prompts per subagent
#
# Run:
#   bin/nexus -config configs/test-multi-subagent.yaml
#
# Prerequisites:
#   - ANTHROPIC_API_KEY set in env or .env
#
# What to test:
#   1. Boot: All three subagent instances init successfully. Check logs for
#      nexus.agent.subagent/researcher, /coder, /reviewer plugin IDs.
#   2. Tool names: Each instance should register a distinct spawn tool:
#      spawn_researcher, spawn_coder, spawn_reviewer. Ask "what tools do you have?"
#      to verify all three appear.
#   3. Spawn researcher: Ask "research the pros and cons of using Go interfaces for
#      plugin systems." Main agent should spawn researcher subagent. Researcher uses
#      "reasoning" role (opus) and should NOT write code (per its system prompt).
#   4. Spawn coder: Ask "write a Go function that reverses a string." Main agent should
#      spawn coder subagent. Coder uses "balanced" role (sonnet), should produce code.
#   5. Spawn reviewer: Ask "review this code: func add(a, b int) int { return a - b }."
#      Reviewer uses "quick" role (haiku), should give concise review.
#   6. Correct model routing: Each subagent uses its configured model_role. Verify in
#      logs that researcher→opus, coder→sonnet, reviewer→haiku.
#   7. Isolation: Subagent conversations are isolated — researcher's context doesn't
#      leak to coder. Spawn researcher, then spawn coder with unrelated task.
#   8. Multi-spawn: Ask a complex question that needs research then code. Main agent
#      should orchestrate by spawning researcher first, then coder with research results.
#
# What to watch for:
#   - Instance IDs with "/" separator handled correctly in plugin registry
#   - Per-instance config applies (different model_role and system_prompt each)
#   - Main react agent (coding-assistant prompt) knows to delegate to subagents
#   - Subagent results returned to main agent context
#   - 15 iteration limit applies to main agent, subagents have own limits
core:
  log_level: info
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: balanced
    reasoning:
      provider: nexus.llm.anthropic
      model: claude-opus-4-20250514
      max_tokens: 16384
    balanced:
      provider: nexus.llm.anthropic
      model: claude-sonnet-4-20250514
      max_tokens: 8192
    quick:
      provider: nexus.llm.anthropic
      model: claude-haiku-4-5-20251001
      max_tokens: 4096
  sessions:
    root: ~/.nexus/sessions
    retention: 30d
    id_format: datetime_short

plugins:
  active:
    - nexus.io.tui
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.agent.subagent/researcher
    - nexus.agent.subagent/coder
    - nexus.agent.subagent/reviewer
    - nexus.gate.endless_loop
    - nexus.tool.shell
    - nexus.tool.file
    - nexus.memory.conversation
    - nexus.observe.logger

  nexus.llm.anthropic:
    api_key_env: ANTHROPIC_API_KEY

  nexus.agent.react:
    system_prompt_file: ./prompts/coding-assistant.md

  nexus.agent.subagent/researcher:
    model_role: reasoning
    system_prompt: "You are a research specialist. Analyze problems thoroughly, identify edge cases, and provide detailed findings. Do not write code — focus on analysis and recommendations."

  nexus.agent.subagent/coder:
    model_role: balanced
    system_prompt: "You are a coding specialist. Write clean, tested code based on requirements provided. Focus on implementation, not analysis."

  nexus.agent.subagent/reviewer:
    model_role: quick
    system_prompt: "You are a code reviewer. Review code for bugs, security issues, and style problems. Be concise and actionable."

  nexus.gate.endless_loop:
    max_iterations: 15

  nexus.tool.shell:
    allowed_commands: [go, git, ls, cat, grep, find, make]
    timeout: 30s
    sandbox: true

  nexus.tool.file:
    allow_external_writes: false

  nexus.memory.conversation:
    max_messages: 100
    persist: true

  nexus.observe.logger:
    output: stderr
    level: info
