# Test: Static planner with approval-required flow
# Validates: plan.created emits with config-defined steps, plan.approval.request
# blocks execution until io.test responds, approve/deny paths produce different
# downstream behavior (plan.result.Approved true vs false).
#
# Uses mocked LLM responses — no API key required.
#
# Run:
#   go test -tags integration ./tests/integration/ -run TestStaticPlanApproval
core:
  log_level: warn
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: mock
    mock:
      provider: nexus.llm.anthropic
      model: mock
      max_tokens: 4096
  sessions:
    root: ~/.nexus/test-sessions
    retention: 30d
    id_format: datetime_short

plugins:
  active:
    - nexus.io.test
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.planner.static
    - nexus.gate.endless_loop
    - nexus.tool.shell
    - nexus.tool.file
    - nexus.memory.capped

  nexus.io.test:
    inputs:
      - "Please review the codebase."
    input_delay: 200ms
    approval_mode: approve
    timeout: 20s
    mock_responses:
      - content: "Plan acknowledged. Review complete."

  nexus.llm.anthropic:
    api_key: "sk-mock-not-used"

  nexus.agent.react:
    planning: true
    system_prompt: "You are a test assistant. Execute the plan provided."

  nexus.planner.static:
    approval: always
    summary: "Code review workflow"
    steps:
      - description: "Read and understand the codebase"
        instructions: "List files and read key source files to understand the project structure."
      - description: "Identify issues"
        instructions: "Look for bugs, security issues, and code quality problems."
      - description: "Propose fixes"
        instructions: "Suggest specific code changes for each issue found."

  nexus.gate.endless_loop:
    max_iterations: 5

  nexus.tool.shell:
    allowed_commands: [ls, cat, grep, find]
    timeout: 15s
    sandbox: true

  nexus.tool.file:
    allow_external_writes: false

  nexus.memory.capped:
    max_messages: 10
    persist: false
