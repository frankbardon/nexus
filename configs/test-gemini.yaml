# Test: Gemini provider live boot + smoke conversation
# Validates: gemini-go (api-key auth) sync + streaming, role-mapping
# (assistant→model). Test gates on GEMINI_API_KEY via t.Skip.
#
# Uses gemini-2.5-flash-lite for cost minimisation.
#
# Run:
#   go test -tags integration ./tests/integration/ -run TestGemini$
core:
  log_level: warn
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: balanced
    balanced:
      provider: nexus.llm.gemini
      model: gemini-2.5-flash-lite
      max_tokens: 256
  sessions:
    root: ~/.nexus/test-sessions
    retention: 30d
    id_format: datetime_short

plugins:
  active:
    - nexus.io.test
    - nexus.llm.gemini
    - nexus.agent.react
    - nexus.gate.endless_loop
    - nexus.memory.capped

  nexus.io.test:
    inputs:
      - "Reply with exactly: GEMINI OK"
    input_delay: 200ms
    approval_mode: approve
    timeout: 60s

  nexus.llm.gemini:
    api_key_env: GEMINI_API_KEY

  nexus.agent.react:
    system_prompt: "You are a test assistant. Follow instructions exactly."

  nexus.gate.endless_loop:
    max_iterations: 3

  nexus.memory.capped:
    max_messages: 10
    persist: false
