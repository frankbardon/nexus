# Demo: Gemini 2.5 thinking (reasoning) parts
# Validates: thinkingConfig request shape, thought-part filtering from Content,
#            thinking.step events feeding nexus.observe.thinking JSONL.
#
# Run:
#   bin/nexus -config configs/demo-gemini-thinking.yaml
#
# What to watch for:
#   - Session dir contains plugins/nexus.observe.thinking/thinking.jsonl with
#     entries authored by Source=nexus.llm.gemini, Phase=reasoning.
#   - Final response Content is the answer only — no chain-of-thought leakage.
#   - usage.ReasoningTokens > 0 for non-trivial prompts.
core:
  log_level: info
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: reasoning
    reasoning:
      provider: nexus.llm.gemini
      model: gemini-2.5-pro
      max_tokens: 16384

plugins:
  active:
    - nexus.io.tui
    - nexus.llm.gemini
    - nexus.agent.react
    - nexus.gate.endless_loop
    - nexus.memory.capped
    - nexus.observe.logger
    - nexus.observe.thinking

  nexus.llm.gemini:
    api_key_env: GEMINI_API_KEY
    thinking:
      enabled: true
      budget_tokens: 8192
      include_thoughts: true

  nexus.agent.react:
    system_prompt: You are a conversationalist, always respond in a helpful manner.

  nexus.gate.endless_loop:
    max_iterations: 5

  nexus.memory.capped:
    max_messages: 50
    persist: true

  nexus.observe.logger:
    output: stderr
    level: info
