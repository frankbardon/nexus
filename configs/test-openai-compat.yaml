# Test: OpenAI-compatible endpoint (e.g. Ollama, LM Studio, vLLM)
# Validates: base_url override, local model support, no-auth path
#
# Run:
#   ollama serve                                          # start Ollama first
#   ollama pull llama3                                    # ensure model available
#   bin/nexus -config configs/test-openai-compat.yaml
#
# Prerequisites:
#   - Ollama running on localhost:11434 (or adjust base_url)
#   - Model "llama3" pulled (or change model name to match your local model)
#   - No real API key needed — api_key is placeholder
#
# What to test:
#   1. Boot: Engine starts, connects to local endpoint without TLS or auth errors.
#   2. Basic chat: Send "Hello" — local model responds. May be slower than cloud.
#   3. Streaming: Verify response streams (debug logs show individual chunks).
#   4. Debug logging: log_level=debug — verify full request/response payloads in stderr.
#      Check that the base_url appears in HTTP request logs.
#   5. Error case: Stop Ollama mid-conversation — should get connection error, not panic.
#   6. Wrong model: Change model to "nonexistent" — verify clear error about model not found.
#
# What to watch for:
#   - base_url correctly used (not OpenAI's default endpoint)
#   - api_key "not-needed" sent but not rejected by Ollama
#   - Debug logs show full HTTP exchange for diagnosing compat issues
#   - Reduced max_messages (50) appropriate for local models with smaller context
core:
  log_level: debug
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: balanced
    balanced:
      provider: nexus.llm.openai
      model: llama3
      max_tokens: 4096
  sessions:
    root: ~/.nexus/sessions
    retention: 30d
    id_format: datetime_short

plugins:
  active:
    - nexus.io.tui
    - nexus.llm.openai
    - nexus.agent.react
    - nexus.gate.endless_loop
    - nexus.memory.conversation
    - nexus.observe.logger

  nexus.llm.openai:
    base_url: "http://localhost:11434/v1/chat/completions"
    api_key: "not-needed"

  nexus.agent.react:
    system_prompt_file: ./prompts/conversationalist.md

  nexus.gate.endless_loop:
    max_iterations: 10

  nexus.memory.conversation:
    max_messages: 50
    persist: true

  nexus.observe.logger:
    output: stderr
    level: debug
