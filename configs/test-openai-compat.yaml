# Test: OpenAI-compatible endpoint via base_url override
# Validates: nexus.llm.openai talks to a non-OpenAI server when base_url is
# overridden. The integration test stands up a httptest.NewServer that returns
# OpenAI-shaped JSON, then injects its URL via copyConfig.
#
# No live API key — the test fakes the upstream entirely.
#
# Run:
#   go test -tags integration ./tests/integration/ -run TestOpenAICompat
core:
  log_level: warn
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: balanced
    balanced:
      provider: nexus.llm.openai
      model: llama3
      max_tokens: 256
  sessions:
    root: ~/.nexus/test-sessions
    retention: 30d
    id_format: datetime_short

plugins:
  active:
    - nexus.io.test
    - nexus.llm.openai
    - nexus.agent.react
    - nexus.gate.endless_loop
    - nexus.memory.capped

  nexus.io.test:
    inputs:
      - "Reply with: COMPAT OK"
    input_delay: 200ms
    approval_mode: approve
    timeout: 20s

  # Test injects base_url via copyConfig at runtime. api_key is a placeholder
  # for OpenAI-compatible servers that don't require auth (Ollama, etc).
  nexus.llm.openai:
    api_key: "not-needed"
    base_url: "http://invalid.placeholder.example/v1/chat/completions"

  nexus.agent.react:
    system_prompt: "You are a test assistant."

  nexus.gate.endless_loop:
    max_iterations: 3

  nexus.memory.capped:
    max_messages: 10
    persist: false
