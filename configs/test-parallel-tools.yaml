# Test: ReAct parallel tool dispatch (issue #14)
# Validates: parallel_tools fans out N tool calls via bounded goroutines,
# gates still evaluate serially, tool_filter vetoes fill the barrier via
# synthetic errors, and history is appended in LLM-returned order.
#
# Run (mock mode — no API key needed):
#   go test -tags integration ./tests/integration/ -run TestParallelTools
#
# Mock mode: the test IO plugin intercepts before:llm.request at priority 20,
# after gates (10), and returns three tool calls in a single response. The
# shell tool executes each echo, and the barrier flushes results in order.
core:
  log_level: warn
  tick_interval: 5s
  max_concurrent_events: 100
  models:
    default: mock
    mock:
      provider: nexus.llm.anthropic
      model: mock
      max_tokens: 4096
  sessions:
    root: ~/.nexus/test-sessions
    retention: 30d
    id_format: datetime_short

plugins:
  active:
    - nexus.io.test
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.tool.shell
    - nexus.memory.conversation

  nexus.io.test:
    inputs:
      - "Run three parallel echo commands."
    input_delay: 200ms
    approval_mode: approve
    timeout: 30s
    mock_responses:
      - tool_calls:
          - name: shell
            arguments: '{"command":"echo alpha"}'
          - name: shell
            arguments: '{"command":"echo bravo"}'
          - name: shell
            arguments: '{"command":"echo charlie"}'
      - content: "All three echoes completed."

  nexus.llm.anthropic:
    api_key: "sk-mock-not-used"

  nexus.agent.react:
    system_prompt: "You are a test assistant."
    parallel_tools: true
    max_concurrent: 4

  nexus.tool.shell:
    allowed_commands: [echo]
    timeout: 5s
    sandbox: true

  nexus.memory.conversation:
    max_messages: 20
    persist: false
