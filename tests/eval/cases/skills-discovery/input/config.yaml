# Eval case: skills-discovery
#
# Boot-time skill scan against the bundled fixture catalog. Mock provider —
# replay short-circuits the agent's LLM call. The skill.discover event
# fires live during boot and is asserted on the observed (live) journal.
core:
  log_level: warn
  tick_interval: 1h
  models:
    default: mock
    mock:
      provider: nexus.llm.anthropic
      model: mock
      max_tokens: 1024
  sessions:
    root: ~/.nexus/test-sessions
    retention: 30d
    id_format: timestamp

journal:
  fsync: none
  retain_days: 30
  rotate_size_mb: 4

plugins:
  active:
    - nexus.llm.anthropic
    - nexus.agent.react
    - nexus.memory.capped
    - nexus.skills

  nexus.llm.anthropic:
    api_key: "sk-mock-not-used"

  nexus.agent.react:
    system_prompt: "You are a test assistant; list any skills you can see."

  nexus.memory.capped:
    max_messages: 20
    persist: false

  nexus.skills:
    scan_paths: ["./tests/fixtures/skills/"]
    trust_project: never
    max_active_skills: 3
    catalog_in_system_prompt: true
    disabled_skills: []
